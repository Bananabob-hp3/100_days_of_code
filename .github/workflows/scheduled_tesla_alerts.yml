name: Tesla Stock News Twilio Alerts

on:
  schedule:
    # ⏱️ Triggers automatically Monday through Friday at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * 1-5'
  workflow_dispatch: # 🎯 This gives you a button on GitHub to run it manually anytime

jobs:
  send-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up runs by caching your libraries

      - name: Install Twilio and Requests Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests twilio

      - name: Execute Stock Tracking Script
        # 🔑 Maps your GitHub Secrets directly into the script's memory
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NA_API_KEY }}
          AVS_API_KEY: ${{ secrets.AVS_API_KEY }}
        # ⚠️ Replace 'your_script.py' with the actual filename of your Python file
        run: python your_script.py
